<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador Jesga x Lobo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="title-wrap">
          <div class="owl-row" aria-hidden="true">
            <span class="owl">🦉</span>
          </div>
          <p class="eyebrow">Contador</p>
          <h1>Tempo desde que a Jesga deixou o time Lobo</h1>
          <p class="start-date">Começou em 21/07/2026</p>
        </div>

        <div class="status-row">
          <div class="info-card">
            <p class="info-title">Mensagem</p>
            <p id="motivation" class="motivation">A jornada começa com um passo firme.</p>
          </div>

          <div class="info-card">
            <p class="info-title">Clima</p>
            <p id="weatherStatus" class="weather-status">Joinville/SC: atualizando clima...</p>
          </div>
        </div>

        <div class="counter" id="counter">
          <div class="unit">
            <span id="days">00</span>
            <small>dias</small>
          </div>
          <div class="unit">
            <span id="hours">00</span>
            <small>horas</small>
          </div>
          <div class="unit">
            <span id="minutes">00</span>
            <small>minutos</small>
          </div>
          <div class="unit">
            <span id="seconds">00</span>
            <small>segundos</small>
          </div>
        </div>

        <p class="footer">Atualizando em tempo real.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
